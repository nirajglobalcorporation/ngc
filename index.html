<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niraj Global Corporation | Luxury Handcrafted Footwear</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){ emailjs.init("C4aYb6XawObk0rLTF"); })();
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{ --primary:#3e2723; --accent:#c6a75e; --bg:#f8f5f1; --white:#ffffff; }
*{margin:0;padding:0;box-sizing:border-box;}
body{ font-family:'Poppins',sans-serif; background:var(--bg); color:#333;}

header{ background:#fff; padding:18px; text-align:center; font-weight:600; font-size:22px; color:var(--primary); position:sticky; top:0; z-index:1000; box-shadow:0 2px 20px rgba(0,0,0,0.05); }

.hero{text-align:center; padding:50px 20px 30px;}
.hero h1{font-family:'Playfair Display',serif; font-size:32px; color:var(--primary);}

.products{ display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:30px; padding:20px; max-width:1200px; margin:0 auto; }

.product-card{ background:var(--white); border-radius:18px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.08); transition:0.3s; }
.product-card:hover{transform:translateY(-6px);}

.slider{position:relative; height:300px; overflow:hidden;}
.slider img{width:100%; height:100%; object-fit:cover; display:none;}
.slider img.active{display:block;}
.slider-buttons{ position:absolute; top:50%; width:100%; display:flex; justify-content:space-between; transform:translateY(-50%); }
.slider-buttons button{ background:rgba(0,0,0,0.4); color:white; border:none; padding:8px 12px; cursor:pointer; border-radius:50%; }

.product-info{padding:20px;}
.price{color:var(--accent); font-weight:600; margin:10px 0;}
.features{font-size:13px; list-style:none; margin-bottom:12px;}
.features li::before {content:"• "; color:var(--accent);}

.size-selector button{ padding:6px 12px; margin:5px 6px 5px 0; border-radius:20px; border:1px solid var(--primary); background:white; cursor:pointer; }
.size-selector button.selected{background:var(--primary); color:white;}

.btn-group {display:flex; gap:10px; margin-top:15px;}
.add-cart,.buy-now{flex:1; padding:12px; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:600;}
.add-cart{background:#5d4037;}
.buy-now{background:linear-gradient(45deg,var(--accent),#b5954a);}

.cart-icon{ position:fixed; top:20px; right:20px; background:var(--primary); color:white; padding:14px; border-radius:50%; cursor:pointer; z-index:2000; }
.cart-count{position:absolute; top:-6px; right:-6px; background:red; padding:3px 6px; font-size:12px; border-radius:50%;}

.cart-sidebar{ position:fixed; right:-100%; top:0; width:100%; max-width:420px; height:100%; background:white; transition:0.4s; padding:25px; overflow-y:auto; z-index:1500; box-shadow:-5px 0 40px rgba(0,0,0,0.3); }
.cart-sidebar.active{right:0;}

.cart-item{border-bottom:1px solid #eee; margin-bottom:12px; padding-bottom:12px;}
.remove-btn{background:red; color:white; border:none; padding:4px 8px; border-radius:5px; cursor:pointer;}

.checkout-btn{ width:100%; padding:14px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:600; }

footer{margin-top:40px; padding:40px 20px; text-align:center; background:#fff; border-top:1px solid #eee;}
.whatsapp-float{ position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:14px 18px; border-radius:50px; text-decoration:none; font-weight:600;}
</style>
</head>

<body>

<header>Niraj Global Corporation</header>

<div class="hero">
<h1>Luxury Handmade Rajasthani Jutti</h1>
</div>

<div class="cart-icon" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>

<div class="products"></div>

<div class="cart-sidebar" id="cartSidebar">
<h3>Your Cart & Checkout</h3>
<div id="cartItems"></div>
<div style="font-weight:600; margin:15px 0;">Total: ₹<span id="finalTotal">0</span></div>

<input type="text" id="custName" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px;">
<input type="tel" id="custPhone" placeholder="Phone Number" style="width:100%; padding:10px; margin-bottom:10px;">
<textarea id="custAddress" placeholder="Full Address with Pincode" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
<input type="text" id="payId" placeholder="Enter Payment ID / UTR" style="width:100%; padding:10px; margin-bottom:10px;">

<button class="checkout-btn" onclick="checkout()" id="confirmBtn">Confirm Order</button>
</div>

<a class="whatsapp-float" href="https://wa.me/918302927385" target="_blank">Chat on WhatsApp</a>

<footer>
<strong>Niraj Global Corporation</strong><br>
Nohar, Rajasthan<br>
📞 +91 8302927385
</footer>

<script>
const products=[
{title:"Brown Men's Jutti",price:1499,rzp:"https://rzp.io/rzp/soDdTOiB",sizes:[6,7,8,9,10],images:["https://i.ibb.co/N1kG9xT/1.jpg","https://i.ibb.co/1fW5g0t/2.jpg","https://i.ibb.co/pLgLd4Z/3.jpg"]},
{title:"Black Men's Jutti",price:1499,rzp:"https://rzp.io/rzp/soDdTOiB",sizes:[6,7,8,9,10],images:["https://i.ibb.co/v6n9dKj/1.jpg","https://i.ibb.co/g4bK7X6/2.jpg","https://i.ibb.co/Hq2W9z9/3.jpg"]}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}

function renderProducts(){
document.querySelector(".products").innerHTML=products.map((p,i)=>`
<div class="product-card">
<div class="slider" id="slider${i}">
${p.images.map((img,idx)=>`<img src="${img}" class="${idx===0?'active':''}">`).join("")}
<div class="slider-buttons">
<button onclick="prevSlide(${i})">‹</button>
<button onclick="nextSlide(${i})">›</button>
</div>
</div>
<div class="product-info">
<h3>${p.title}</h3>
<div class="price">₹${p.price}</div>
<div class="size-selector" id="size${i}">
${p.sizes.map(s=>`<button onclick="selectSize(${i},this)">${s}</button>`).join("")}
</div>
<div class="btn-group">
<button class="add-cart" onclick="addToCart(${i})">Add to Cart</button>
<button class="buy-now" onclick="buyNow(${i})">Buy Now</button>
</div>
</div>
</div>`).join("");
}

function selectSize(i,btn){
document.querySelectorAll(`#size${i} button`).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");
}

function addToCart(i){
let size=document.querySelector(`#size${i} .selected`);
if(!size){alert("Select size"); return false;}
cart.push({...products[i],selectedSize:size.innerText});
saveCart();
updateCart();
return true;
}

function buyNow(i){if(addToCart(i))toggleCart();}

function updateCart(){
let total=0,html="";
cart.forEach((item,index)=>{
total+=item.price;
html+=`<div class="cart-item"><b>${item.title}</b> (Size ${item.selectedSize}) - ₹${item.price}
<button class="remove-btn" onclick="removeItem(${index})">×</button></div>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("finalTotal").innerText=total;
document.getElementById("cartCount").innerText=cart.length;
saveCart();
}

function removeItem(i){cart.splice(i,1);updateCart();}

function toggleCart(){document.getElementById("cartSidebar").classList.toggle("active");}

function prevSlide(i){
let slides=document.querySelectorAll(`#slider${i} img`);
let active=[...slides].findIndex(s=>s.classList.contains("active"));
slides[active].classList.remove("active");
slides[(active-1+slides.length)%slides.length].classList.add("active");
}
function nextSlide(i){
let slides=document.querySelectorAll(`#slider${i} img`);
let active=[...slides].findIndex(s=>s.classList.contains("active"));
slides[active].classList.remove("active");
slides[(active+1)%slides.length].classList.add("active");
}

function checkout(){
let name=custName.value.trim();
let phone=custPhone.value.trim();
let addr=custAddress.value.trim();
let payId=payIdInput.value.trim();

if(!name||!phone||!addr||!payId){alert("Fill all details");return;}
if(phone.length<10){alert("Enter valid phone");return;}

let total=document.getElementById("finalTotal").innerText;

let message=`🛍️ NEW ORDER\nCustomer: ${name}\nPhone: ${phone}\nAddress: ${addr}\nItems:\n`;
cart.forEach(item=>message+=`- ${item.title} (Size ${item.selectedSize})\n`);
message+=`Total: ₹${total}\nPayment ID: ${payId}`;

cart=[];
saveCart();
updateCart();

window.location.href=`https://wa.me/918302927385?text=${encodeURIComponent(message)}`;
}

const custName=document.getElementById("custName");
const custPhone=document.getElementById("custPhone");
const custAddress=document.getElementById("custAddress");
const payIdInput=document.getElementById("payId");

renderProducts();
updateCart();
</script>

</body>
</html>
